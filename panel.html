<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WHI Control Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --bg: #06060f;
    --surface: #0d0d1a;
    --surface2: #131322;
    --border: rgba(255,255,255,0.06);
    --border-hover: rgba(255,255,255,0.12);
    --text: #eeeef5;
    --text-dim: #55556a;
    --text-mid: #9090a8;
    --accent: #6c6af7;
    --accent-glow: rgba(108,106,247,0.2);
    --green: #00e5a0;
    --green-glow: rgba(0,229,160,0.15);
    --red: #ff4f6a;
    --radius: 12px;
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
}

body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
        linear-gradient(rgba(108,106,247,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(108,106,247,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
}

body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 700px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(108,106,247,0.07) 0%, transparent 70%);
    pointer-events: none;
}

.panel {
    position: relative;
    z-index: 1;
    width: 440px;
    max-width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 40px 80px rgba(0,0,0,0.5);
}

/* Top accent bar */
.panel::before {
    content: '';
    display: block;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), #9c6af7, transparent);
}

.panel-inner { padding: 32px 36px 36px; }

/* Header */
.panel-header {
    margin-bottom: 32px;
}

.panel-title {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 6px;
}

.panel-icon {
    width: 34px;
    height: 34px;
    background: linear-gradient(135deg, var(--accent), #9c6af7);
    border-radius: 9px;
    display: grid;
    place-items: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 15px;
    color: #fff;
    box-shadow: 0 0 20px rgba(108,106,247,0.3);
    flex-shrink: 0;
}

.panel-title h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.3px;
    background: linear-gradient(135deg, var(--text), var(--text-mid));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.panel-sub {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.3px;
    padding-left: 46px;
}

/* Section label */
.section-lbl {
    font-size: 9px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin-bottom: 10px;
    margin-top: 24px;
}

.section-lbl:first-of-type { margin-top: 0; }

/* Toggle row */
.toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    transition: border-color 0.2s;
}

.toggle-row:hover { border-color: var(--border-hover); }

.toggle-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
}

.toggle-wrap {
    position: relative;
    width: 44px;
    height: 24px;
    flex-shrink: 0;
}

.toggle-input {
    position: absolute;
    opacity: 0;
    width: 0;
    height: 0;
}

.toggle-track {
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.08);
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.2s, box-shadow 0.2s;
    border: 1px solid var(--border);
}

.toggle-track::after {
    content: '';
    position: absolute;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--text-dim);
    top: 2px;
    left: 2px;
    transition: transform 0.2s, background 0.2s;
}

.toggle-input:checked + .toggle-track {
    background: var(--green);
    box-shadow: 0 0 12px var(--green-glow);
    border-color: transparent;
}

.toggle-input:checked + .toggle-track::after {
    transform: translateX(20px);
    background: #fff;
}

/* Input row */
.input-field {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
}

.input-field:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
}

.input-field label {
    display: block;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    padding: 12px 16px 0;
}

.input-field input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    padding: 6px 16px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: var(--text);
    caret-color: var(--accent);
}

.input-field input::placeholder { color: var(--text-dim); }

/* Save button */
.save-btn {
    width: 100%;
    margin-top: 24px;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.3px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 4px 24px rgba(108,106,247,0.3);
}

.save-btn:hover { opacity: 0.92; box-shadow: 0 4px 32px rgba(108,106,247,0.45); }
.save-btn:active { transform: scale(0.98); }

/* Status bar */
.status-bar {
    margin-top: 14px;
    padding: 11px 16px;
    border-radius: 8px;
    font-size: 11px;
    text-align: center;
    display: none;
    animation: fade-in 0.2s ease;
}

@keyframes fade-in { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; } }

.status-bar.success {
    display: block;
    background: rgba(0,229,160,0.08);
    color: var(--green);
    border: 1px solid rgba(0,229,160,0.2);
}

.status-bar.error {
    display: block;
    background: rgba(255,79,106,0.08);
    color: var(--red);
    border: 1px solid rgba(255,79,106,0.2);
}

/* Divider */
.divider {
    height: 1px;
    background: var(--border);
    margin: 28px 0;
}

/* Live config */
.live-config {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
}

.live-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    padding: 4px 0;
}

.live-row + .live-row { border-top: 1px solid var(--border); margin-top: 8px; padding-top: 8px; }

.live-key { color: var(--text-dim); }

.live-val { font-weight: 500; }
.live-val.on  { color: var(--green); }
.live-val.off { color: var(--red); }

/* Online count */
.online-pill {
    margin-top: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text-dim);
    padding: 10px;
    background: rgba(0,229,160,0.04);
    border: 1px solid rgba(0,229,160,0.08);
    border-radius: 8px;
}

.online-pill span { color: var(--green); font-weight: 500; }
</style>
</head>
<body>

<div class="panel">
    <div class="panel-inner">
        <div class="panel-header">
            <div class="panel-title">
                <div class="panel-icon">W</div>
                <h1>Control Panel</h1>
            </div>
            <div class="panel-sub">changes apply to all accounts within ~10 seconds</div>
        </div>

        <div class="section-lbl">Trade Mode</div>
        <div class="toggle-row">
            <span class="toggle-label">Enabled</span>
            <label class="toggle-wrap">
                <input type="checkbox" class="toggle-input" id="tradeToggle">
                <span class="toggle-track"></span>
            </label>
        </div>

        <div class="section-lbl">Target Player</div>
        <div class="input-field">
            <label for="targetPlayer">Username</label>
            <input type="text" id="targetPlayer" placeholder="Enter username...">
        </div>

        <button class="save-btn" onclick="saveConfig()">Save & Push to All Accounts</button>
        <div class="status-bar" id="statusBar"></div>

        <div class="divider"></div>

        <div class="section-lbl">Live Config</div>
        <div class="live-config">
            <div class="live-row">
                <span class="live-key">Trade</span>
                <span class="live-val off" id="liveTradeEnabled">OFF</span>
            </div>
            <div class="live-row">
                <span class="live-key">Target</span>
                <span class="live-val" id="liveTargetPlayer">—</span>
            </div>
        </div>

        <div class="online-pill" id="onlineCount">
            <span id="onlineNum">0</span> / <span id="totalNum">0</span> accounts online
        </div>
    </div>
</div>

<script>
async function saveConfig() {
    const enabled = document.getElementById("tradeToggle").checked;
    const targetPlayer = document.getElementById("targetPlayer").value.trim();
    const bar = document.getElementById("statusBar");

    try {
        const res = await fetch("/api/config", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ trade: { enabled, targetPlayer } })
        });

        if (res.ok) {
            bar.className = "status-bar success";
            bar.textContent = "Pushed — accounts will pick it up within 10 seconds";
            pollConfig();
        } else {
            bar.className = "status-bar error";
            bar.textContent = "Failed to save config";
        }
    } catch(e) {
        bar.className = "status-bar error";
        bar.textContent = "Network error";
    }

    setTimeout(() => { bar.className = "status-bar"; }, 5000);
}

async function pollConfig() {
    try {
        const res = await fetch("/api/config");
        if (!res.ok) return;
        const cfg = await res.json();

        document.getElementById("tradeToggle").checked = cfg.trade.enabled;
        document.getElementById("targetPlayer").value = cfg.trade.targetPlayer || "";

        const el = document.getElementById("liveTradeEnabled");
        el.textContent = cfg.trade.enabled ? "ON" : "OFF";
        el.className = "live-val " + (cfg.trade.enabled ? "on" : "off");
        document.getElementById("liveTargetPlayer").textContent = cfg.trade.targetPlayer || "—";
    } catch(e) {}
}

async function pollOnline() {
    try {
        const res = await fetch("/api/accounts");
        if (!res.ok) return;
        const accs = await res.json();
        const total = Object.keys(accs).length;
        const online = Object.values(accs).filter(a => a.timestamp && (Date.now() - a.timestamp) < 30000).length;
        document.getElementById("onlineNum").textContent = online;
        document.getElementById("totalNum").textContent = total;
    } catch(e) {}
}

pollConfig();
pollOnline();
setInterval(pollConfig, 5000);
setInterval(pollOnline, 5000);
</script>
</body>
</html>
