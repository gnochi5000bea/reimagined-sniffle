<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WHI Control Panel</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

[data-theme="dark"] {
    --bg:           #1c1c1e;
    --surface:      rgba(44,44,46,0.98);
    --surface2:     rgba(58,58,60,0.8);
    --surface3:     rgba(72,72,74,0.6);
    --border:       rgba(255,255,255,0.10);
    --border-focus: rgba(10,132,255,0.6);
    --text:         #f5f5f7;
    --text2:        rgba(245,245,247,0.55);
    --text3:        rgba(245,245,247,0.28);
    --blue:         #0a84ff;
    --blue-bg:      rgba(10,132,255,0.15);
    --green:        #30d158;
    --green-bg:     rgba(48,209,88,0.12);
    --green-border: rgba(48,209,88,0.25);
    --red:          #ff453a;
    --red-bg:       rgba(255,69,58,0.12);
    --red-border:   rgba(255,69,58,0.25);
    --shadow:       0 4px 20px rgba(0,0,0,0.4), 0 1px 4px rgba(0,0,0,0.25);
    --blur-bg:      rgba(44,44,46,0.88);
}

[data-theme="light"] {
    --bg:           #f2f2f7;
    --surface:      rgba(255,255,255,0.98);
    --surface2:     rgba(242,242,247,0.9);
    --surface3:     rgba(229,229,234,0.7);
    --border:       rgba(0,0,0,0.06);
    --border-focus: rgba(0,122,255,0.5);
    --text:         #1d1d1f;
    --text2:        rgba(29,29,31,0.5);
    --text3:        rgba(29,29,31,0.28);
    --blue:         #007aff;
    --blue-bg:      rgba(0,122,255,0.1);
    --green:        #34c759;
    --green-bg:     rgba(52,199,89,0.1);
    --green-border: rgba(52,199,89,0.25);
    --red:          #ff3b30;
    --red-bg:       rgba(255,59,48,0.1);
    --red-border:   rgba(255,59,48,0.25);
    --shadow:       0 4px 20px rgba(0,0,0,0.1), 0 1px 3px rgba(0,0,0,0.06);
    --blur-bg:      rgba(255,255,255,0.85);
}

html { -webkit-font-smoothing: antialiased; }

body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "SF Pro Display", "SF Pro Text", BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    transition: background 0.35s, color 0.35s;
}

/* ── NAV ── */
nav {
    background: var(--blur-bg);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    transition: background 0.35s;
}

.nav-logo { font-size: 17px; font-weight: 600; letter-spacing: -0.4px; }

.nav-right { display: flex; align-items: center; gap: 10px; }

.nav-link {
    font-size: 13px;
    font-weight: 500;
    color: var(--blue);
    text-decoration: none;
    padding: 5px 10px;
    border-radius: 7px;
    transition: background 0.15s;
}
.nav-link:hover { background: var(--blue-bg); }

.theme-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: none;
    background: var(--surface2);
    cursor: pointer;
    font-size: 15px;
    display: grid;
    place-items: center;
    transition: background 0.2s, transform 0.15s;
}
.theme-btn:hover { background: var(--surface3); transform: scale(1.05); }
.theme-btn:active { transform: scale(0.95); }

/* ── BODY ── */
.body {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
}

/* ── PANEL ── */
.panel {
    width: 440px;
    max-width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: var(--shadow);
    animation: panel-in 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
    transition: background 0.35s, border-color 0.35s;
}

@keyframes panel-in {
    from { opacity: 0; transform: translateY(16px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
}

.panel-top { padding: 28px 28px 0; }

/* Header */
.panel-header { margin-bottom: 28px; }

.panel-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 4px;
}

.panel-sub {
    font-size: 13px;
    color: var(--text2);
    font-weight: 400;
}

/* Divider */
.divider {
    height: 1px;
    background: var(--border);
    margin: 0 28px;
}

/* Sections */
.section { padding: 20px 28px 0; }

.section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text3);
    margin-bottom: 10px;
}

/* Toggle row */
.toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    transition: background 0.2s, border-color 0.2s;
}

.toggle-row:hover { border-color: rgba(255,255,255,0.14); }
[data-theme="light"] .toggle-row:hover { border-color: rgba(0,0,0,0.12); }

.toggle-name {
    font-size: 15px;
    font-weight: 500;
    letter-spacing: -0.2px;
}

/* iOS-style toggle */
.ios-toggle { position: relative; width: 51px; height: 31px; flex-shrink: 0; }

.ios-toggle input {
    position: absolute;
    opacity: 0;
    width: 0;
    height: 0;
}

.ios-track {
    position: absolute;
    inset: 0;
    border-radius: 15.5px;
    background: var(--surface3);
    cursor: pointer;
    transition: background 0.25s;
}

.ios-track::after {
    content: '';
    position: absolute;
    width: 27px;
    height: 27px;
    border-radius: 50%;
    background: #fff;
    top: 2px;
    left: 2px;
    transition: transform 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    box-shadow: 0 2px 6px rgba(0,0,0,0.25);
}

.ios-toggle input:checked + .ios-track {
    background: var(--green);
}

.ios-toggle input:checked + .ios-track::after {
    transform: translateX(20px);
}

/* Input */
.input-group {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
}

.input-group:focus-within {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(10,132,255,0.12);
}

[data-theme="light"] .input-group:focus-within {
    box-shadow: 0 0 0 3px rgba(0,122,255,0.12);
}

.input-label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text3);
    padding: 12px 16px 0;
}

.input-group input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    padding: 5px 16px 13px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 400;
    color: var(--text);
    caret-color: var(--blue);
}

.input-group input::placeholder { color: var(--text3); }

/* Save button */
.save-wrap { padding: 20px 28px 24px; }

.save-btn {
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    border: none;
    background: var(--blue);
    color: #fff;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.2px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
}

.save-btn:hover   { opacity: 0.88; }
.save-btn:active  { transform: scale(0.98); opacity: 0.8; }

/* Toast */
.toast {
    margin: 0 28px 20px;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    text-align: center;
    display: none;
    animation: toast-in 0.25s ease;
}

@keyframes toast-in {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
}

.toast.ok  { display: block; background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
.toast.err { display: block; background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }

/* Live config */
.live-section {
    background: var(--bg);
    border-top: 1px solid var(--border);
    padding: 20px 28px;
    transition: background 0.35s;
}

.live-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text3);
    margin-bottom: 14px;
}

.live-rows { display: flex; flex-direction: column; gap: 10px; }

.live-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
}

.live-key { color: var(--text2); font-weight: 400; }
.live-val { font-weight: 600; }
.live-val.on  { color: var(--green); }
.live-val.off { color: var(--text3); }

.online-row {
    margin-top: 16px;
    padding: 10px 14px;
    background: var(--surface2);
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--text2);
}

.online-row strong { color: var(--green); font-weight: 600; }
</style>
</head>
<body>

<nav>
    <span class="nav-logo">WHI</span>
    <div class="nav-right">
        <a href="/" class="nav-link">← Dashboard</a>
        <button class="theme-btn" id="themeBtn">🌙</button>
    </div>
</nav>

<div class="body">
    <div class="panel">
        <div class="panel-top">
            <div class="panel-header">
                <div class="panel-title">Control Panel</div>
                <div class="panel-sub">Changes push to all accounts within ~10 seconds</div>
            </div>

            <div class="section">
                <div class="section-title">Trade Mode</div>
                <div class="toggle-row">
                    <span class="toggle-name">Enabled</span>
                    <label class="ios-toggle">
                        <input type="checkbox" id="tradeToggle">
                        <span class="ios-track"></span>
                    </label>
                </div>
            </div>

            <div class="section" style="padding-bottom:24px">
                <div class="section-title" style="margin-top:20px">Target Player</div>
                <div class="input-group">
                    <label class="input-label" for="targetPlayer">Username</label>
                    <input type="text" id="targetPlayer" placeholder="Enter username…" autocomplete="off" autocorrect="off" autocapitalize="off">
                </div>
            </div>
        </div>

        <div class="divider"></div>

        <div class="save-wrap">
            <button class="save-btn" onclick="saveConfig()">Save & Push to All Accounts</button>
        </div>

        <div class="toast" id="toast"></div>

        <div class="live-section">
            <div class="live-title">Live Config</div>
            <div class="live-rows">
                <div class="live-row">
                    <span class="live-key">Trade mode</span>
                    <span class="live-val off" id="liveEnabled">Off</span>
                </div>
                <div class="live-row">
                    <span class="live-key">Target player</span>
                    <span class="live-val" id="liveTarget">—</span>
                </div>
            </div>
            <div class="online-row">
                <span>Accounts online</span>
                <span><strong id="onlineNum">0</strong> / <span id="totalNum">0</span></span>
            </div>
        </div>
    </div>
</div>

<script>
// Theme
const html = document.documentElement;
const themeBtn = document.getElementById("themeBtn");
const saved = localStorage.getItem("whi-theme") || "dark";
html.setAttribute("data-theme", saved);
themeBtn.textContent = saved === "dark" ? "☀️" : "🌙";

themeBtn.addEventListener("click", () => {
    const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
    html.setAttribute("data-theme", next);
    themeBtn.textContent = next === "dark" ? "☀️" : "🌙";
    localStorage.setItem("whi-theme", next);
});

async function saveConfig() {
    const enabled = document.getElementById("tradeToggle").checked;
    const targetPlayer = document.getElementById("targetPlayer").value.trim();
    const toast = document.getElementById("toast");

    try {
        const r = await fetch("/api/config", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ trade: { enabled, targetPlayer } })
        });
        if (r.ok) {
            toast.className = "toast ok";
            toast.textContent = "Saved — accounts will pick up changes within 10 seconds";
            pollConfig();
        } else {
            toast.className = "toast err";
            toast.textContent = "Failed to save config";
        }
    } catch(e) {
        toast.className = "toast err";
        toast.textContent = "Network error";
    }

    setTimeout(() => { toast.className = "toast"; }, 4000);
}

async function pollConfig() {
    try {
        const r = await fetch("/api/config");
        if (!r.ok) return;
        const cfg = await r.json();

        document.getElementById("tradeToggle").checked = cfg.trade.enabled;
        document.getElementById("targetPlayer").value = cfg.trade.targetPlayer || "";

        const el = document.getElementById("liveEnabled");
        el.textContent = cfg.trade.enabled ? "On" : "Off";
        el.className = "live-val " + (cfg.trade.enabled ? "on" : "off");
        document.getElementById("liveTarget").textContent = cfg.trade.targetPlayer || "—";
    } catch(e) {}
}

async function pollOnline() {
    try {
        const r = await fetch("/api/accounts");
        if (!r.ok) return;
        const accs = await r.json();
        const total = Object.keys(accs).length;
        const online = Object.values(accs).filter(a => a.timestamp && (Date.now() - a.timestamp) < 30000).length;
        document.getElementById("onlineNum").textContent = online;
        document.getElementById("totalNum").textContent = total;
    } catch(e) {}
}

pollConfig();
pollOnline();
setInterval(pollConfig, 5000);
setInterval(pollOnline, 5000);
</script>
</body>
</html>
