<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WHI Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --bg: #08080c;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --text: #e0e0ec;
    --text-dim: #6a6a80;
    --accent: #6488ff;
    --green: #4ade80;
    --amber: #fbbf24;
    --red: #f87171;
    --purple: #a78bfa;
    --cyan: #22d3ee;
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
}

.noise {
    position: fixed;
    inset: 0;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
}

header {
    padding: 40px 48px 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 16px;
}

.logo {
    display: flex;
    align-items: center;
    gap: 14px;
}

.logo-icon {
    width: 42px;
    height: 42px;
    background: linear-gradient(135deg, var(--accent), var(--amber));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 800;
    color: #fff;
}

.logo h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }

.logo p {
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    margin-top: 2px;
}

.pulse-dot {
    width: 8px; height: 8px;
    background: var(--green);
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
    animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.4); }
    50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(74, 222, 128, 0); }
}

.header-stats {
    display: flex;
    gap: 32px;
    align-items: center;
}

.header-stat { text-align: right; }

.header-stat .value {
    font-size: 28px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: -1px;
}

.header-stat .label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
}

.header-stat .value.green { color: var(--green); }
.header-stat .value.amber { color: var(--amber); }
.header-stat .value.accent { color: var(--accent); }
.header-stat .value.purple { color: var(--purple); }

main { padding: 32px 48px 48px; }

.filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
}

.filter-btn {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
}

.filter-btn:hover { border-color: #4a4a60; color: var(--text); }
.filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 12px;
    align-items: start;
}

.card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 20px 28px;
    transition: border-color 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
}

.card:hover { border-color: #3a3a50; transform: translateY(-1px); }
.card.offline { opacity: 0.45; }

.card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
}

.card-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 200px;
}

.type-badge {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 3px 8px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
}

.type-badge.farming { background: rgba(74, 222, 128, 0.12); color: var(--green); border: 1px solid rgba(74, 222, 128, 0.25); }
.type-badge.training { background: rgba(251, 191, 36, 0.12); color: var(--amber); border: 1px solid rgba(251, 191, 36, 0.25); }

.tier-label {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 3px 8px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    margin-left: 6px;
}

.tier-label.high { background: rgba(167, 139, 250, 0.12); color: var(--purple); border: 1px solid rgba(167, 139, 250, 0.25); }
.tier-label.mid { background: rgba(100, 136, 255, 0.12); color: var(--accent); border: 1px solid rgba(100, 136, 255, 0.25); }
.tier-label.low { background: rgba(34, 211, 238, 0.12); color: var(--cyan); border: 1px solid rgba(34, 211, 238, 0.25); }

.card-status {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--green);
    margin-bottom: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.card-status.offline-text { color: var(--text-dim); }

.card-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
}

.stat {
    background: var(--surface2);
    border-radius: 6px;
    padding: 8px 10px;
}

.stat .stat-label {
    font-size: 9px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-weight: 600;
    margin-bottom: 2px;
}

.stat .stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
}

.stat .stat-value.gold { color: var(--amber); }

.card-indicators { margin-top: 10px; }

.indicator-group { margin-bottom: 6px; }

.indicator-header {
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    padding: 4px 8px;
    border-radius: 4px 4px 0 0;
    background: rgba(251, 191, 36, 0.12);
    color: var(--amber);
    border: 1px solid rgba(251, 191, 36, 0.2);
    border-bottom: none;
    display: flex;
    justify-content: space-between;
}

.indicator-count {
    background: rgba(251, 191, 36, 0.25);
    padding: 0 6px;
    border-radius: 3px;
    font-size: 9px;
}

.indicator-animals {
    background: var(--surface2);
    border: 1px solid rgba(251, 191, 36, 0.12);
    border-radius: 0 0 4px 4px;
    max-height: 120px;
    overflow-y: auto;
}

.indicator-animals::-webkit-scrollbar { width: 4px; }
.indicator-animals::-webkit-scrollbar-track { background: transparent; }
.indicator-animals::-webkit-scrollbar-thumb { background: rgba(251, 191, 36, 0.3); border-radius: 2px; }

.indicator-animal {
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    padding: 3px 8px;
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.03);
}

.indicator-animal:last-child { border-bottom: none; }
.indicator-animal .breed { color: var(--text); font-weight: 500; }
.indicator-animal .coat { color: var(--cyan); }
.indicator-animal .hair { color: var(--purple); }

.last-update {
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim);
    position: absolute;
    bottom: 8px;
    right: 12px;
}

.empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 20px;
    color: var(--text-dim);
}

.empty-state h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
.empty-state p { font-family: 'JetBrains Mono', monospace; font-size: 13px; }
</style>
</head>
<body>
<div class="noise"></div>

<header>
    <div class="logo">
        <div class="logo-icon">W</div>
        <div>
            <h1>WHI Dashboard</h1>
            <p><span class="pulse-dot"></span>live</p>
        </div>
    </div>
    <div class="header-stats">
        <div class="header-stat">
            <div class="value accent" id="totalAccounts">0</div>
            <div class="label">Accounts</div>
        </div>
        <div class="header-stat">
            <div class="value green" id="onlineCount">0</div>
            <div class="label">Online</div>
        </div>
        <div class="header-stat">
            <div class="value amber" id="totalCaught">0</div>
            <div class="label">Caught</div>
        </div>
        <div class="header-stat">
            <div class="value purple" id="totalReceipts">0</div>
            <div class="label">Receipts</div>
        </div>
    </div>
</header>

<main>
    <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="online">Online</button>
        <button class="filter-btn" data-filter="offline">Offline</button>
        <button class="filter-btn" data-filter="farming">Farming</button>
        <button class="filter-btn" data-filter="training">Training</button>
    </div>
    <div class="grid" id="grid"></div>
</main>

<script>
const POLL_INTERVAL = 3000;
const OFFLINE_THRESHOLD = 30000;
let currentFilter = "all";
let accounts = {};

document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
        document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentFilter = btn.dataset.filter;
        render();
    });
});

function timeAgo(ts) {
    const diff = Math.floor((Date.now() - ts) / 1000);
    if (diff < 5) return "just now";
    if (diff < 60) return diff + "s ago";
    if (diff < 3600) return Math.floor(diff / 60) + "m ago";
    if (diff < 86400) return Math.floor(diff / 3600) + "h ago";
    return Math.floor(diff / 86400) + "d ago";
}

function formatUptime(seconds) {
    if (!seconds || seconds <= 0) return "0s";
    const d = Math.floor(seconds / 86400);
    const h = Math.floor((seconds % 86400) / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    if (d > 0) return d + "d " + h + "h";
    if (h > 0) return h + "h " + m + "m";
    return m + "m";
}

function isOnline(acc) {
    return acc.timestamp && (Date.now() - acc.timestamp) < OFFLINE_THRESHOLD;
}

function isFarming(acc) {
    return acc.animalsCaptured !== undefined || acc.tier !== undefined;
}

function render() {
    const grid = document.getElementById("grid");
    const entries = Object.entries(accounts);

    entries.sort((a, b) => {
        const aOn = isOnline(a[1]) ? 0 : 1;
        const bOn = isOnline(b[1]) ? 0 : 1;
        if (aOn !== bOn) return aOn - bOn;
        return a[0].localeCompare(b[0]);
    });

    const filtered = entries.filter(([name, acc]) => {
        if (currentFilter === "all") return true;
        if (currentFilter === "online") return isOnline(acc);
        if (currentFilter === "offline") return !isOnline(acc);
        if (currentFilter === "farming") return isFarming(acc);
        if (currentFilter === "training") return !isFarming(acc);
        return true;
    });

    if (filtered.length === 0) {
        grid.innerHTML = `<div class="empty-state"><h2>No accounts</h2><p>waiting for status reports...</p></div>`;
        return;
    }

    let totalCaught = 0, onlineCount = 0, totalReceipts = 0;

    entries.forEach(([, acc]) => {
        totalCaught += acc.animalsCaptured || 0;
        totalReceipts += acc.trainingReceipts || 0;
        if (isOnline(acc)) onlineCount++;
    });

    document.getElementById("totalAccounts").textContent = entries.length;
    document.getElementById("onlineCount").textContent = onlineCount;
    document.getElementById("totalCaught").textContent = totalCaught.toLocaleString();
    document.getElementById("totalReceipts").textContent = totalReceipts.toLocaleString();

    grid.innerHTML = filtered.map(([name, acc]) => {
        const online = isOnline(acc);
        const farming = isFarming(acc);

        let badges = "";
        if (farming) {
            badges += `<span class="type-badge farming">Farm</span>`;
            const tier = (acc.tier || "").toLowerCase();
            if (tier) badges += `<span class="tier-label ${tier}">${acc.tier}</span>`;
        } else {
            badges += `<span class="type-badge training">Train</span>`;
        }

        let statsHtml = "";
        if (farming) {
            statsHtml = `
                <div class="stat"><div class="stat-label">Island</div><div class="stat-value">${acc.island || "—"}</div></div>
                <div class="stat"><div class="stat-label">Uptime</div><div class="stat-value">${formatUptime(acc.uptime)}</div></div>
                <div class="stat"><div class="stat-label">Level</div><div class="stat-value">${acc.level || 0}</div></div>
                <div class="stat"><div class="stat-label">Tokens</div><div class="stat-value">${(acc.tokens || 0).toLocaleString()}</div></div>
                <div class="stat"><div class="stat-label">Caught</div><div class="stat-value gold">${(acc.animalsCaptured || 0).toLocaleString()}</div></div>
                <div class="stat"><div class="stat-label">Lassos</div><div class="stat-value">${(acc.lassoCount || 0).toLocaleString()}</div></div>`;
        } else {
            statsHtml = `
                <div class="stat"><div class="stat-label">Island</div><div class="stat-value">${acc.island || "—"}</div></div>
                <div class="stat"><div class="stat-label">Uptime</div><div class="stat-value">${formatUptime(acc.uptime)}</div></div>
                <div class="stat"><div class="stat-label">Receipts</div><div class="stat-value gold">${(acc.trainingReceipts || 0).toLocaleString()}</div></div>
                <div class="stat"><div class="stat-label">Tokens</div><div class="stat-value">${(acc.tokens || 0).toLocaleString()}</div></div>`;
        }

        // Indicators (farming accounts only)
        let indicatorHtml = "";
        if (farming && acc.indicators) {
            for (const [ind, animals] of Object.entries(acc.indicators)) {
                if (!Array.isArray(animals) || animals.length === 0) continue;
                const rows = animals.map(a =>
                    `<div class="indicator-animal"><span class="breed">${a.breed}</span><span class="coat">${a.coat}</span><span class="hair">${a.maneColor}</span></div>`
                ).join("");
                indicatorHtml += `
                <div class="indicator-group">
                    <div class="indicator-header">
                        <span>${ind}</span>
                        <span class="indicator-count">${animals.length}</span>
                    </div>
                    <div class="indicator-animals">${rows}</div>
                </div>`;
            }
        }

        return `
        <div class="card ${online ? "" : "offline"}">
            <div class="card-header">
                <span class="card-name" title="${name}">${name}</span>
                <div>${badges}</div>
            </div>
            <div class="card-status ${online ? "" : "offline-text"}">${online ? (acc.status || "Running") : "Offline"}</div>
            <div class="card-stats">${statsHtml}</div>
            ${indicatorHtml ? `<div class="card-indicators">${indicatorHtml}</div>` : ""}
            <div class="last-update">${acc.timestamp ? timeAgo(acc.timestamp) : "never"}</div>
        </div>`;
    }).join("");
}

async function poll() {
    try {
        const res = await fetch("/api/accounts");
        if (res.ok) { accounts = await res.json(); render(); }
    } catch (e) {}
}

poll();
setInterval(poll, POLL_INTERVAL);
</script>
</body>
</html>
