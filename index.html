<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WHI Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --bg: #06060f;
    --surface: #0d0d1a;
    --surface2: #13132200;
    --border: rgba(255,255,255,0.06);
    --border-hover: rgba(255,255,255,0.12);
    --text: #eeeef5;
    --text-dim: #55556a;
    --text-mid: #9090a8;
    --accent: #6c6af7;
    --accent-glow: rgba(108,106,247,0.15);
    --green: #00e5a0;
    --green-glow: rgba(0,229,160,0.12);
    --amber: #ffb547;
    --amber-glow: rgba(255,181,71,0.12);
    --red: #ff4f6a;
    --purple: #a78bfa;
    --cyan: #22d9ee;
    --radius: 12px;
}

html { scrollbar-width: thin; scrollbar-color: #1e1e30 transparent; }

body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
}

/* Grid background */
body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
        linear-gradient(rgba(108,106,247,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(108,106,247,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
}

/* Radial glow top */
body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 900px;
    height: 500px;
    background: radial-gradient(ellipse, rgba(108,106,247,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
}

.wrap { position: relative; z-index: 1; }

/* ── HEADER ── */
header {
    padding: 48px 52px 36px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 32px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
}

.brand {
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.brand-top {
    display: flex;
    align-items: center;
    gap: 14px;
}

.brand-icon {
    width: 38px;
    height: 38px;
    background: linear-gradient(135deg, var(--accent), #9c6af7);
    border-radius: 10px;
    display: grid;
    place-items: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 17px;
    color: #fff;
    flex-shrink: 0;
    box-shadow: 0 0 24px rgba(108,106,247,0.3);
}

.brand h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 26px;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--text) 40%, var(--text-mid));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.live-badge {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
}

.live-dot {
    width: 7px;
    height: 7px;
    background: var(--green);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--green);
    animation: live-pulse 2s ease-in-out infinite;
}

@keyframes live-pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--green); }
    50% { opacity: 0.5; box-shadow: 0 0 3px var(--green); }
}

.header-stats {
    display: flex;
    gap: 2px;
    align-items: stretch;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--surface);
}

.hstat {
    padding: 16px 28px;
    text-align: center;
    position: relative;
}

.hstat + .hstat::before {
    content: '';
    position: absolute;
    left: 0;
    top: 20%;
    height: 60%;
    width: 1px;
    background: var(--border);
}

.hstat-val {
    font-family: 'Syne', sans-serif;
    font-size: 30px;
    font-weight: 800;
    letter-spacing: -1.5px;
    line-height: 1;
    margin-bottom: 4px;
}

.hstat-lbl {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 500;
}

.hstat-val.c-accent { color: var(--accent); }
.hstat-val.c-green { color: var(--green); }
.hstat-val.c-amber { color: var(--amber); }
.hstat-val.c-purple { color: var(--purple); }

/* ── MAIN ── */
main { padding: 32px 52px 60px; }

/* ── FILTERS ── */
.toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 12px;
}

.filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
}

.filter-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    padding: 7px 16px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.3px;
}

.filter-btn:hover {
    border-color: var(--border-hover);
    color: var(--text);
}

.filter-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    box-shadow: 0 0 16px rgba(108,106,247,0.25);
}

.count-badge {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.3px;
}

/* ── GRID ── */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 14px;
    align-items: start;
}

/* ── CARD ── */
.card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
    position: relative;
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    animation: card-in 0.3s ease both;
    overflow: hidden;
}

.card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 3px;
    height: 100%;
    background: var(--accent);
    opacity: 0.5;
    transition: opacity 0.2s;
}

.card.online::before { background: var(--green); opacity: 0.8; }
.card.offline::before { background: var(--text-dim); opacity: 0.4; }
.card.farming::before { background: var(--green); }
.card.training::before { background: var(--amber); }

.card:hover {
    border-color: var(--border-hover);
    box-shadow: 0 8px 40px rgba(0,0,0,0.4), 0 0 0 1px var(--border-hover);
    transform: translateY(-2px);
}

.card.offline { opacity: 0.4; }

@keyframes card-in {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
}

/* Remove button */
.remove-btn {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 24px;
    height: 24px;
    border-radius: 6px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-dim);
    font-size: 13px;
    cursor: pointer;
    display: grid;
    place-items: center;
    opacity: 0;
    transition: all 0.15s;
    line-height: 1;
}

.card:hover .remove-btn { opacity: 1; }
.remove-btn:hover {
    background: rgba(255,79,106,0.15);
    border-color: rgba(255,79,106,0.3);
    color: var(--red);
}

/* Card header */
.card-name {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: calc(100% - 80px);
    margin-bottom: 4px;
}

.card-badges {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-bottom: 14px;
    flex-wrap: wrap;
}

.badge {
    font-size: 9px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    padding: 3px 9px;
    border-radius: 4px;
}

.badge-farm  { background: rgba(0,229,160,0.1); color: var(--green); border: 1px solid rgba(0,229,160,0.2); }
.badge-train { background: rgba(255,181,71,0.1); color: var(--amber); border: 1px solid rgba(255,181,71,0.2); }
.badge-online  { background: rgba(0,229,160,0.08); color: var(--green); border: 1px solid rgba(0,229,160,0.15); }
.badge-offline { background: rgba(255,255,255,0.04); color: var(--text-dim); border: 1px solid var(--border); }
.badge-tier { background: rgba(167,139,250,0.1); color: var(--purple); border: 1px solid rgba(167,139,250,0.2); }

/* Status line */
.card-status {
    font-size: 11px;
    color: var(--green);
    margin-bottom: 16px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    opacity: 0.9;
}

.card-status.dim { color: var(--text-dim); }

/* Stats grid */
.stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 14px;
}

.stat {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
}

.stat-lbl {
    font-size: 9px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 3px;
}

.stat-val {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.stat-val.gold { color: var(--amber); }

/* Indicators */
.indicators { margin-top: 4px; }

.ind-group { margin-bottom: 6px; }

.ind-head {
    font-size: 9px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--amber);
    padding: 4px 10px;
    background: rgba(255,181,71,0.08);
    border: 1px solid rgba(255,181,71,0.15);
    border-bottom: none;
    border-radius: 6px 6px 0 0;
    display: flex;
    justify-content: space-between;
}

.ind-count {
    background: rgba(255,181,71,0.2);
    padding: 0 6px;
    border-radius: 3px;
}

.ind-animals {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,181,71,0.1);
    border-radius: 0 0 6px 6px;
    max-height: 110px;
    overflow-y: auto;
}

.ind-row {
    font-size: 10px;
    padding: 4px 10px;
    display: flex;
    justify-content: space-between;
    gap: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
}
.ind-row:last-child { border-bottom: none; }
.ind-row .breed { color: var(--text); }
.ind-row .coat  { color: var(--cyan); }
.ind-row .hair  { color: var(--purple); }

/* Timestamp */
.card-ts {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
}

/* ── EMPTY ── */
.empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 100px 20px;
}

.empty h2 {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 8px;
}

.empty p { color: var(--text-dim); font-size: 13px; }
</style>
</head>
<body>
<div class="wrap">

<header>
    <div class="brand">
        <div class="brand-top">
            <div class="brand-icon">W</div>
            <h1>WHI Dashboard</h1>
        </div>
        <div class="live-badge">
            <span class="live-dot"></span>
            live · updates every 10s
        </div>
    </div>

    <div class="header-stats">
        <div class="hstat">
            <div class="hstat-val c-accent" id="totalAccounts">0</div>
            <div class="hstat-lbl">Accounts</div>
        </div>
        <div class="hstat">
            <div class="hstat-val c-green" id="onlineCount">0</div>
            <div class="hstat-lbl">Online</div>
        </div>
        <div class="hstat">
            <div class="hstat-val c-amber" id="totalCaught">0</div>
            <div class="hstat-lbl">Caught</div>
        </div>
        <div class="hstat">
            <div class="hstat-val c-purple" id="totalReceipts">0</div>
            <div class="hstat-lbl">Receipts</div>
        </div>
    </div>
</header>

<main>
    <div class="toolbar">
        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="online">Online</button>
            <button class="filter-btn" data-filter="offline">Offline</button>
            <button class="filter-btn" data-filter="farming">Farming</button>
            <button class="filter-btn" data-filter="training">Training</button>
        </div>
        <span class="count-badge" id="countBadge"></span>
    </div>

    <div class="grid" id="grid"></div>
</main>

</div>
<script>
const OFFLINE_THRESHOLD = 30000;
let currentFilter = "all";
let accounts = {};

document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
        document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentFilter = btn.dataset.filter;
        render();
    });
});

function timeAgo(ts) {
    const d = Math.floor((Date.now() - ts) / 1000);
    if (d < 5) return "just now";
    if (d < 60) return d + "s ago";
    if (d < 3600) return Math.floor(d / 60) + "m ago";
    return Math.floor(d / 3600) + "h ago";
}

function formatUptime(s) {
    if (!s || s <= 0) return "0s";
    const d = Math.floor(s / 86400), h = Math.floor((s % 86400) / 3600), m = Math.floor((s % 3600) / 60);
    if (d > 0) return d + "d " + h + "h";
    if (h > 0) return h + "h " + m + "m";
    return m + "m";
}

function isOnline(acc) { return acc.timestamp && (Date.now() - acc.timestamp) < OFFLINE_THRESHOLD; }
function isFarming(acc) { return acc.animalsCaptured !== undefined || acc.tier !== undefined; }

async function removeAccount(username) {
    try {
        await fetch(`/api/accounts/${encodeURIComponent(username)}`, { method: "DELETE" });
        delete accounts[username];
        render();
    } catch(e) {}
}

function render() {
    const grid = document.getElementById("grid");
    const entries = Object.entries(accounts);

    entries.sort((a, b) => {
        const aOn = isOnline(a[1]) ? 0 : 1, bOn = isOnline(b[1]) ? 0 : 1;
        return aOn !== bOn ? aOn - bOn : a[0].localeCompare(b[0]);
    });

    const filtered = entries.filter(([, acc]) => {
        if (currentFilter === "all") return true;
        if (currentFilter === "online") return isOnline(acc);
        if (currentFilter === "offline") return !isOnline(acc);
        if (currentFilter === "farming") return isFarming(acc);
        if (currentFilter === "training") return !isFarming(acc);
        return true;
    });

    let caught = 0, receipts = 0, online = 0;
    entries.forEach(([, acc]) => {
        caught += acc.animalsCaptured || 0;
        receipts += acc.trainingReceipts || 0;
        if (isOnline(acc)) online++;
    });

    document.getElementById("totalAccounts").textContent = entries.length;
    document.getElementById("onlineCount").textContent = online;
    document.getElementById("totalCaught").textContent = caught.toLocaleString();
    document.getElementById("totalReceipts").textContent = receipts.toLocaleString();
    document.getElementById("countBadge").textContent = filtered.length + " account" + (filtered.length !== 1 ? "s" : "");

    if (filtered.length === 0) {
        grid.innerHTML = `<div class="empty"><h2>No accounts</h2><p>Waiting for status reports...</p></div>`;
        return;
    }

    grid.innerHTML = filtered.map(([name, acc], i) => {
        const online = isOnline(acc);
        const farming = isFarming(acc);

        const typeBadge = farming
            ? `<span class="badge badge-farm">Farm</span>`
            : `<span class="badge badge-train">Train</span>`;
        const statusBadge = online
            ? `<span class="badge badge-online">● Online</span>`
            : `<span class="badge badge-offline">○ Offline</span>`;
        const tierBadge = farming && acc.tier
            ? `<span class="badge badge-tier">${acc.tier}</span>` : "";

        let stats = "";
        if (farming) {
            stats = `
                <div class="stat"><div class="stat-lbl">Caught</div><div class="stat-val gold">${(acc.animalsCaptured || 0).toLocaleString()}</div></div>
                <div class="stat"><div class="stat-lbl">Tokens</div><div class="stat-val">${(acc.tokens || 0).toLocaleString()}</div></div>
                <div class="stat"><div class="stat-lbl">Island</div><div class="stat-val">${acc.island || "—"}</div></div>
                <div class="stat"><div class="stat-lbl">Uptime</div><div class="stat-val">${formatUptime(acc.uptime)}</div></div>`;
        } else {
            stats = `
                <div class="stat"><div class="stat-lbl">Receipts</div><div class="stat-val gold">${(acc.trainingReceipts || 0).toLocaleString()}</div></div>
                <div class="stat"><div class="stat-lbl">Tokens</div><div class="stat-val">${(acc.tokens || 0).toLocaleString()}</div></div>
                <div class="stat"><div class="stat-lbl">Island</div><div class="stat-val">${acc.island || "—"}</div></div>
                <div class="stat"><div class="stat-lbl">Uptime</div><div class="stat-val">${formatUptime(acc.uptime)}</div></div>`;
        }

        let indHtml = "";
        if (farming && acc.indicators) {
            for (const [ind, animals] of Object.entries(acc.indicators)) {
                if (!Array.isArray(animals) || animals.length === 0) continue;
                const rows = animals.map(a => `
                    <div class="ind-row">
                        <span class="breed">${a.breed}</span>
                        <span class="coat">${a.coat}</span>
                        <span class="hair">${a.maneColor}</span>
                    </div>`).join("");
                indHtml += `<div class="ind-group">
                    <div class="ind-head"><span>${ind}</span><span class="ind-count">${animals.length}</span></div>
                    <div class="ind-animals">${rows}</div>
                </div>`;
            }
        }

        const cardClass = [
            "card",
            online ? "online" : "offline",
            farming ? "farming" : "training"
        ].join(" ");

        return `<div class="${cardClass}" style="animation-delay:${i * 0.04}s">
            <button class="remove-btn" onclick="removeAccount('${name}')" title="Remove">✕</button>
            <div class="card-name" title="${name}">${name}</div>
            <div class="card-badges">${typeBadge}${statusBadge}${tierBadge}</div>
            <div class="card-status ${online ? "" : "dim"}">${online ? (acc.status || "Running") : "Offline"}</div>
            <div class="stats">${stats}</div>
            ${indHtml ? `<div class="indicators">${indHtml}</div>` : ""}
            <div class="card-ts">
                <span>${acc.island || "—"}</span>
                <span>${acc.timestamp ? timeAgo(acc.timestamp) : "never"}</span>
            </div>
        </div>`;
    }).join("");
}

async function poll() {
    try {
        const res = await fetch("/api/accounts");
        if (res.ok) { accounts = await res.json(); render(); }
    } catch(e) {}
}

poll();
setInterval(poll, 10000);
</script>
</body>
</html>
