<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hatsune.miku Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── TOKENS ── */
[data-theme="dark"] {
    --bg:           #1c1c1e;
    --bg2:          #2c2c2e;
    --surface:      rgba(44,44,46,0.95);
    --surface2:     rgba(58,58,60,0.7);
    --surface3:     rgba(72,72,74,0.5);
    --border:       rgba(255,255,255,0.10);
    --border-strong:rgba(255,255,255,0.18);
    --text:         #f5f5f7;
    --text2:        rgba(245,245,247,0.6);
    --text3:        rgba(245,245,247,0.32);
    --blue:         #0a84ff;
    --green:        #30d158;
    --amber:        #ffd60a;
    --red:          #ff453a;
    --purple:       #bf5af2;
    --cyan:         #5ac8fa;
    --teal:         #40c8e0;
    --shadow:       0 2px 16px rgba(0,0,0,0.35), 0 1px 4px rgba(0,0,0,0.25);
    --shadow-lg:    0 8px 32px rgba(0,0,0,0.45), 0 2px 8px rgba(0,0,0,0.25);
    --blur-bg:      rgba(44,44,46,0.85);
    --theme-icon:   "☀️";
}

[data-theme="light"] {
    --bg:           #f2f2f7;
    --bg2:          #ffffff;
    --surface:      rgba(255,255,255,0.95);
    --surface2:     rgba(242,242,247,0.8);
    --surface3:     rgba(229,229,234,0.6);
    --border:       rgba(0,0,0,0.06);
    --border-strong:rgba(0,0,0,0.12);
    --text:         #1d1d1f;
    --text2:        rgba(29,29,31,0.55);
    --text3:        rgba(29,29,31,0.28);
    --blue:         #007aff;
    --green:        #34c759;
    --amber:        #ff9f0a;
    --red:          #ff3b30;
    --purple:       #af52de;
    --cyan:         #32ade6;
    --teal:         #30b0c7;
    --shadow:       0 2px 12px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.05);
    --shadow-lg:    0 8px 32px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
    --blur-bg:      rgba(255,255,255,0.85);
    --theme-icon:   "🌙";
}

html { -webkit-font-smoothing: antialiased; }

body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "SF Pro Display", "SF Pro Text", BlinkMacSystemFont, sans-serif;
    font-size: 15px;
    min-height: 100vh;
    transition: background 0.35s ease, color 0.35s ease;
}

/* ── NAVBAR ── */
nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--blur-bg);
    backdrop-filter: saturate(200%) blur(28px);
    -webkit-backdrop-filter: saturate(200%) blur(28px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: background 0.35s;
}

.nav-left { display: flex; align-items: center; gap: 16px; }

.nav-logo {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.4px;
    color: var(--text);
}

.live-chip {
    display: flex;
    align-items: center;
    gap: 5px;
    background: rgba(48,209,88,0.12);
    border: 1px solid rgba(48,209,88,0.2);
    border-radius: 20px;
    padding: 3px 9px 3px 7px;
    font-size: 11px;
    font-weight: 500;
    color: var(--green);
    letter-spacing: 0.1px;
}

.live-dot {
    width: 6px; height: 6px;
    background: var(--green);
    border-radius: 50%;
    animation: live 2s ease-in-out infinite;
}

@keyframes live {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.4; }
}

.nav-right { display: flex; align-items: center; gap: 10px; }

.nav-link {
    font-size: 13px;
    font-weight: 500;
    color: var(--blue);
    text-decoration: none;
    padding: 5px 10px;
    border-radius: 7px;
    transition: background 0.15s;
}
.nav-link:hover { background: rgba(10,132,255,0.08); }

.theme-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: none;
    background: var(--surface2);
    cursor: pointer;
    font-size: 15px;
    display: grid;
    place-items: center;
    transition: background 0.2s, transform 0.15s;
    flex-shrink: 0;
}
.theme-btn:hover { background: var(--surface3); transform: scale(1.05); }
.theme-btn:active { transform: scale(0.95); }

/* ── PAGE ── */
.page { max-width: 1200px; margin: 0 auto; padding: 32px 32px 64px; }

/* ── SUMMARY BAR ── */
.summary {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(0, 1fr));
    gap: 12px;
    margin-bottom: 28px;
}

.scard {
    background: var(--surface);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 22px;
    box-shadow: var(--shadow);
    transition: background 0.35s, border-color 0.35s, box-shadow 0.2s, transform 0.15s, opacity 0.25s;
    animation: fade-up 0.4s ease both;
    min-width: 0;
}

.scard:hover { transform: translateY(-1px); box-shadow: var(--shadow-lg); }

@keyframes fade-up {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
}

.scard-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    letter-spacing: 0.2px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 5px;
}

.scard-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
}

.scard-val {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -1.2px;
    line-height: 1;
}

.c-blue   { color: var(--blue); }
.c-green  { color: var(--green); }
.c-amber  { color: var(--amber); }
.c-purple { color: var(--purple); }

/* ── TOOLBAR ── */
.toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
    flex-wrap: wrap;
    gap: 10px;
}

.seg-control {
    display: flex;
    background: var(--surface2);
    backdrop-filter: saturate(180%) blur(16px);
    -webkit-backdrop-filter: saturate(180%) blur(16px);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 2px;
    gap: 1px;
}

.seg-btn {
    font-size: 12px;
    font-weight: 500;
    padding: 5px 14px;
    border: none;
    background: transparent;
    color: var(--text2);
    border-radius: 7px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.1px;
    white-space: nowrap;
}

.seg-btn.active {
    background: var(--bg2);
    color: var(--text);
    box-shadow: var(--shadow);
}

[data-theme="light"] .seg-btn.active { background: #fff; }

.result-count {
    font-size: 12px;
    color: var(--text3);
    font-weight: 500;
}

/* ── GRID ── */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 12px;
    align-items: start;
}

/* ── CARD ── */
.card {
    background: var(--surface);
    backdrop-filter: saturate(180%) blur(24px);
    -webkit-backdrop-filter: saturate(180%) blur(24px);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 0;
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: background 0.35s, border-color 0.35s, box-shadow 0.2s, transform 0.15s, opacity 0.3s;
    position: relative;
}

.card.is-new {
    animation: fade-up 0.35s ease both;
}

.card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-lg);
    border-color: var(--border-strong);
}

.card.offline { opacity: 0.45; }

/* Color strip top */
.card-strip {
    height: 3px;
    width: 100%;
}
.strip-farm  { background: linear-gradient(90deg, var(--green), var(--teal)); }
.strip-train { background: linear-gradient(90deg, var(--amber), #ff9500); }
.strip-off   { background: var(--surface3); }

.card-body { padding: 18px 20px 20px; }

/* Card header row */
.card-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 12px;
}

.card-name {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.3px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 200px;
}

.card-badges {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    justify-content: flex-end;
}

.pill {
    font-size: 10px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 20px;
    letter-spacing: 0.2px;
    white-space: nowrap;
}

.pill-farm    { background: rgba(48,209,88,0.12);  color: var(--green); }
.pill-train   { background: rgba(255,214,10,0.12); color: var(--amber); }
.pill-online  { background: rgba(48,209,88,0.10);  color: var(--green); }
.pill-offline { background: var(--surface3); color: var(--text3); }
.pill-tier    { background: rgba(191,90,242,0.12); color: var(--purple); }

/* Status */
.card-status {
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 16px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-weight: 400;
    line-height: 1.4;
}

/* Stats */
.stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 14px;
}

.stat-cell {
    background: var(--surface2);
    backdrop-filter: saturate(180%) blur(12px);
    -webkit-backdrop-filter: saturate(180%) blur(12px);
    border-radius: 10px;
    padding: 11px 13px;
    transition: background 0.35s;
}

.stat-key {
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    margin-bottom: 3px;
    letter-spacing: 0.1px;
}

.stat-val {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.4px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.stat-val.gold { color: var(--amber); }

/* Footer */
.card-foot {
    padding-top: 12px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.card-ts {
    font-size: 11px;
    color: var(--text3);
    font-weight: 400;
}

.remove-btn {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--text3);
    font-size: 13px;
    cursor: pointer;
    display: grid;
    place-items: center;
    opacity: 0;
    transition: all 0.15s;
}

.card:hover .remove-btn { opacity: 1; }
.remove-btn:hover { background: rgba(255,69,58,0.1); color: var(--red); }

/* Indicators */
.ind-wrap { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }

.ind-group { margin-bottom: 8px; }

.ind-head {
    font-size: 11px;
    font-weight: 600;
    color: var(--amber);
    margin-bottom: 4px;
    display: flex;
    justify-content: space-between;
}

.ind-count-badge {
    background: rgba(255,214,10,0.15);
    color: var(--amber);
    padding: 1px 7px;
    border-radius: 10px;
    font-size: 10px;
}

.ind-list {
    background: var(--surface2);
    border-radius: 8px;
    overflow: hidden;
    max-height: 110px;
    overflow-y: auto;
}

.ind-row {
    font-size: 11px;
    padding: 5px 11px;
    display: flex;
    gap: 10px;
    border-bottom: 1px solid var(--border);
}
.ind-row:last-child { border-bottom: none; }
.ind-breed { color: var(--text); font-weight: 500; flex: 1; }
.ind-coat  { color: var(--cyan); }
.ind-hair  { color: var(--purple); }

/* ── EMPTY ── */
.empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 100px 20px;
    color: var(--text2);
}
.empty h2 { font-size: 22px; font-weight: 600; margin-bottom: 6px; letter-spacing: -0.4px; color: var(--text); }
.empty p  { font-size: 14px; }

/* Stagger delays */
.card:nth-child(1) { animation-delay: 0s; }
.card:nth-child(2) { animation-delay: 0.04s; }
.card:nth-child(3) { animation-delay: 0.08s; }
.card:nth-child(4) { animation-delay: 0.12s; }
.card:nth-child(5) { animation-delay: 0.16s; }
.card:nth-child(6) { animation-delay: 0.20s; }

@media (max-width: 700px) {
    nav { padding: 0 16px; }
    .page { padding: 20px 16px 48px; }
    .summary { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<nav>
    <div class="nav-left">
        <img src="https://github.com/gnochi5000bea/reimagined-sniffle/blob/main/logo.png?raw=true" alt="logo" style="width:32px;height:32px;border-radius:8px;object-fit:cover;flex-shrink:0;">
        <span class="nav-logo">hatsune.miku</span>
        <div class="live-chip">
            <span class="live-dot"></span>
            Live
        </div>
    </div>
    <div class="nav-right">
        <a href="/panel" class="nav-link">Control Panel ↗</a>
        <button class="theme-btn" id="themeBtn" title="Toggle theme">🌙</button>
    </div>
</nav>

<div class="page">

    <div class="summary">
        <div class="scard" style="animation-delay:0s">
            <div class="scard-label"><span class="scard-dot" style="background:var(--blue)"></span>Accounts</div>
            <div class="scard-val c-blue" id="totalAccounts">0</div>
        </div>
        <div class="scard" style="animation-delay:0.06s">
            <div class="scard-label"><span class="scard-dot" style="background:var(--green)"></span>Online</div>
            <div class="scard-val c-green" id="onlineCount">0</div>
        </div>
        <div class="scard" style="animation-delay:0.12s">
            <div class="scard-label"><span class="scard-dot" style="background:var(--amber)"></span>Total Tokens</div>
            <div class="scard-val c-amber" id="totalTokens">0</div>
        </div>
        <div class="scard" id="dynamicScard" style="animation-delay:0.18s; display:none">
            <div class="scard-label"><span class="scard-dot" id="dynamicDot"></span><span id="dynamicLabel"></span></div>
            <div class="scard-val" id="dynamicVal">0</div>
        </div>
    </div>

    <div class="toolbar">
        <div class="seg-control">
            <button class="seg-btn active" data-filter="all">All</button>
            <button class="seg-btn" data-filter="online">Online</button>
            <button class="seg-btn" data-filter="offline">Offline</button>
            <button class="seg-btn" data-filter="farming">Farming</button>
            <button class="seg-btn" data-filter="training">Training</button>
        </div>
        <span class="result-count" id="resultCount"></span>
    </div>

    <div class="grid" id="grid"></div>
</div>

<a href="https://discord.gg/GgHvfFp38m" target="_blank" style="position:fixed;bottom:14px;right:18px;font-size:10px;font-family:-apple-system,BlinkMacSystemFont,sans-serif;color:var(--text3);text-decoration:none;letter-spacing:0.2px;transition:color 0.15s;z-index:50;" onmouseover="this.style.color='var(--text2)'" onmouseout="this.style.color='var(--text3)'">https://discord.gg/GgHvfFp38m</a>

<script>
const OFFLINE = 30000;
let filter = "all";
let accounts = {};
const knownAccounts = new Set(); // tracks which cards already exist in the DOM

// Theme
const html = document.documentElement;
const themeBtn = document.getElementById("themeBtn");
const saved = localStorage.getItem("whi-theme") || "dark";
html.setAttribute("data-theme", saved);
themeBtn.textContent = saved === "dark" ? "☀️" : "🌙";

themeBtn.addEventListener("click", () => {
    const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
    html.setAttribute("data-theme", next);
    themeBtn.textContent = next === "dark" ? "☀️" : "🌙";
    localStorage.setItem("whi-theme", next);
});

// Filters
document.querySelectorAll(".seg-btn").forEach(btn => {
    btn.addEventListener("click", () => {
        document.querySelectorAll(".seg-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        filter = btn.dataset.filter;
        render();
    });
});

function updateDynamicScard(entries) {
    const scard = document.getElementById("dynamicScard");
    const dot   = document.getElementById("dynamicDot");
    const label = document.getElementById("dynamicLabel");
    const val   = document.getElementById("dynamicVal");

    if (filter === "training") {
        let receipts = 0;
        entries.forEach(([, a]) => { if (!farming(a)) receipts += a.trainingReceipts || 0; });
        const wasHidden = scard.style.display === "none";
        scard.style.display = "";
        if (wasHidden) { scard.style.animation = "none"; scard.offsetHeight; scard.style.animation = "fade-up 0.3s ease both"; }
        dot.style.background = "var(--purple)";
        label.textContent = "Training Receipts";
        val.className = "scard-val c-purple";
        val.textContent = receipts.toLocaleString();
    } else if (filter === "farming") {
        let caught = 0;
        entries.forEach(([, a]) => { if (farming(a)) caught += a.animalsCaptured || 0; });
        const wasHidden = scard.style.display === "none";
        scard.style.display = "";
        if (wasHidden) { scard.style.animation = "none"; scard.offsetHeight; scard.style.animation = "fade-up 0.3s ease both"; }
        dot.style.background = "var(--green)";
        label.textContent = "Animals Caught";
        val.className = "scard-val c-green";
        val.textContent = caught.toLocaleString();
    } else {
        scard.style.display = "none";
    }
}

function ago(ts) {
    const d = Math.floor((Date.now() - ts) / 1000);
    if (d < 5)    return "just now";
    if (d < 60)   return d + "s ago";
    if (d < 3600) return Math.floor(d / 60) + "m ago";
    return Math.floor(d / 3600) + "h ago";
}

function uptime(s) {
    if (!s || s <= 0) return "—";
    const d = Math.floor(s / 86400), h = Math.floor((s % 86400) / 3600), m = Math.floor((s % 3600) / 60);
    if (d > 0) return d + "d " + h + "h";
    if (h > 0) return h + "h " + m + "m";
    return m + "m";
}

function online(a)  { return a.timestamp && (Date.now() - a.timestamp) < OFFLINE; }
function farming(a) { return a.animalsCaptured !== undefined || a.tier !== undefined; }

async function removeAccount(name) {
    try {
        await fetch(`/api/accounts/${encodeURIComponent(name)}`, { method: "DELETE" });
        delete accounts[name];
        knownAccounts.delete(name);
        const el = document.getElementById("card-" + CSS.escape(name));
        if (el) el.remove();
        render();
    } catch(e) {}
}

function buildCardInner(name, acc) {
    const isOnline  = online(acc);
    const isFarming = farming(acc);
    const strip = !isOnline ? "strip-off" : isFarming ? "strip-farm" : "strip-train";

    const badges = [
        isFarming
            ? `<span class="pill pill-farm">Farm</span>`
            : `<span class="pill pill-train">Train</span>`,
        isOnline
            ? `<span class="pill pill-online">● Online</span>`
            : `<span class="pill pill-offline">○ Offline</span>`,
        acc.tier ? `<span class="pill pill-tier">${acc.tier}</span>` : "",
    ].join("");

    let stats = "";
    if (isFarming) {
        stats = `
            <div class="stat-cell"><div class="stat-key">Island</div><div class="stat-val">${acc.island || "—"}</div></div>
            <div class="stat-cell"><div class="stat-key">Level</div><div class="stat-val">${acc.level || 0}</div></div>
            <div class="stat-cell"><div class="stat-key">Caught</div><div class="stat-val gold">${(acc.animalsCaptured || 0).toLocaleString()}</div></div>
            <div class="stat-cell"><div class="stat-key">Uptime</div><div class="stat-val">${uptime(acc.uptime)}</div></div>
            <div class="stat-cell"><div class="stat-key">Tokens</div><div class="stat-val">${(acc.tokens || 0).toLocaleString()}</div></div>
            <div class="stat-cell"><div class="stat-key">Lassos</div><div class="stat-val">${(acc.lassoCount || 0).toLocaleString()}</div></div>`;
    } else {
        stats = `
            <div class="stat-cell"><div class="stat-key">Receipts</div><div class="stat-val gold">${(acc.trainingReceipts || 0).toLocaleString()}</div></div>
            <div class="stat-cell"><div class="stat-key">Tokens</div><div class="stat-val">${(acc.tokens || 0).toLocaleString()}</div></div>
            <div class="stat-cell"><div class="stat-key">Island</div><div class="stat-val">${acc.island || "—"}</div></div>
            <div class="stat-cell"><div class="stat-key">Uptime</div><div class="stat-val">${uptime(acc.uptime)}</div></div>`;
    }

    let indHtml = "";
    if (isFarming && acc.indicators) {
        let rows = "";
        for (const [ind, animals] of Object.entries(acc.indicators)) {
            if (!Array.isArray(animals) || !animals.length) continue;
            rows += `<div class="ind-group">
                <div class="ind-head"><span>${ind}</span><span class="ind-count-badge">${animals.length}</span></div>
                <div class="ind-list">${animals.map(a => `
                    <div class="ind-row">
                        <span class="ind-breed">${a.breed}</span>
                        <span class="ind-coat">${a.coat}</span>
                        <span class="ind-hair">${a.maneColor}</span>
                    </div>`).join("")}
                </div>
            </div>`;
        }
        if (rows) indHtml = `<div class="ind-wrap">${rows}</div>`;
    }

    return {
        strip,
        offlineClass: isOnline ? "" : "offline",
        inner: `
            <div class="card-strip ${strip}"></div>
            <div class="card-body">
                <div class="card-head">
                    <div class="card-name" title="${name}">${name}</div>
                    <div class="card-badges">${badges}</div>
                </div>
                <div class="card-status">${isOnline ? (acc.status || "Running") : "Offline"}</div>
                <div class="stats-grid">${stats}</div>
                ${indHtml}
                <div class="card-foot">
                    <span class="card-ts">${acc.timestamp ? ago(acc.timestamp) : "never"}</span>
                    <button class="remove-btn" onclick="removeAccount('${name}')" title="Remove">✕</button>
                </div>
            </div>`
    };
}

function render() {
    const grid = document.getElementById("grid");
    const entries = Object.entries(accounts);
    entries.sort((a, b) => (online(a[1]) ? 0 : 1) - (online(b[1]) ? 0 : 1) || a[0].localeCompare(b[0]));

    const filtered = entries.filter(([, a]) => {
        if (filter === "online")   return online(a);
        if (filter === "offline")  return !online(a);
        if (filter === "farming")  return farming(a);
        if (filter === "training") return !farming(a);
        return true;
    });

    let tokens = 0, onlineN = 0;
    entries.forEach(([, a]) => {
        tokens += a.tokens || 0;
        if (online(a)) onlineN++;
    });

    document.getElementById("totalAccounts").textContent = entries.length;
    document.getElementById("onlineCount").textContent   = onlineN;
    document.getElementById("totalTokens").textContent   = tokens.toLocaleString();
    document.getElementById("resultCount").textContent   = filtered.length + " account" + (filtered.length !== 1 ? "s" : "");
    updateDynamicScard(entries);

    // Remove cards that are no longer in filtered list
    const filteredNames = new Set(filtered.map(([n]) => n));
    grid.querySelectorAll(".card[id]").forEach(el => {
        const name = decodeURIComponent(el.id.replace("card-", ""));
        if (!filteredNames.has(name)) el.remove();
    });

    if (!filtered.length) {
        if (!grid.querySelector(".empty")) {
            grid.innerHTML = `<div class="empty"><h2>No accounts</h2><p>Waiting for status reports…</p></div>`;
        }
        return;
    }

    // Remove empty state if present
    const emptyEl = grid.querySelector(".empty");
    if (emptyEl) emptyEl.remove();

    filtered.forEach(([name, acc], i) => {
        const id = "card-" + encodeURIComponent(name);
        const { inner, offlineClass } = buildCardInner(name, acc);
        let el = document.getElementById(id);

        if (!el) {
            // New card — create with animation
            el = document.createElement("div");
            el.id = id;
            el.className = "card is-new " + offlineClass;
            el.innerHTML = inner;
            grid.appendChild(el);
            knownAccounts.add(name);
            // Remove animation class after it plays so re-filtering doesn't re-trigger
            el.addEventListener("animationend", () => el.classList.remove("is-new"), { once: true });
        } else {
            // Existing card — update content only, no animation
            el.className = "card " + offlineClass;
            el.innerHTML = inner;
        }
    });

    // Re-order DOM nodes to match sorted order
    filtered.forEach(([name]) => {
        const id = "card-" + encodeURIComponent(name);
        const el = document.getElementById(id);
        if (el) grid.appendChild(el); // appendChild moves if already in DOM
    });
}

async function poll() {
    try {
        const r = await fetch("/api/accounts");
        if (r.ok) { accounts = await r.json(); render(); }
    } catch(e) {}
}

poll();
setInterval(poll, 3000);
</script>
</body>
</html>
